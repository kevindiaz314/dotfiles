console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[palette]
  black = '#262B44'
  blue = '#89B4FA'
  green = '#00ff00'
  lavender = '#B4BEFE'
  orange = '#F07623'
  pink = '#F5C2E7'
  red = '#D81E5B'
  text = '#494D64'
  white = '#E0DEF4'
  wight = '#FFFFFF'
  yellow = '#F3AE35'

[secondary_prompt]
  template = '<p:yellow,transparent>ŅéČ</><,p:yellow> > </><p:yellow,transparent>Ņé░</> '
  foreground = 'p:black'
  background = 'transparent'

[transient_prompt]
  template = 'ŌØ» '
  foreground = 'p:green'
  background = 'transparent'

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = 'ŅéČ'
    trailing_diamond = 'Ņé░'
    template = ' {{ if .SSHSession }}Ņ«® {{ end }} '
    foreground = 'p:text'
    background = 'p:blue'
    type = 'session'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = 'ŅéČ'
    trailing_diamond = 'Ņé░'
    template = ' {{ if .WSL }} WSL at {{ end }}{{.Icon}} '
    foreground = 'p:wight'
    background = 'p:blue'
    type = 'os'
    style = 'diamond'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    template = ' ’ü╝  {{ path .Path .Location }} '
    foreground = 'p:text'
    powerline_symbol = 'Ņé░'
    background = 'p:pink'
    type = 'path'
    style = 'powerline'

    [blocks.segments.properties]
      cache_duration = 'none'
      style = 'full'

  [[blocks.segments]]
    template = ' {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ’üä {{ .Working.String }} |{{ end }}{{ if .Staging.Changed }} ’üå {{ .Staging.String }}{{ end }} '
    foreground = 'p:text'
    powerline_symbol = 'Ņé░'
    background = 'p:lavender'
    type = 'git'
    style = 'powerline'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:text{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:white{{ end }}', '{{ if gt .Ahead 0 }}p:white{{ end }}']
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:lavender{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}', '{{ if gt .Ahead 0 }}#49416D{{ end }}', '{{ if gt .Behind 0 }}#7A306C{{ end }}']

    [blocks.segments.properties]
      branch_icon = '’ä” '
      branch_max_length = 35
      cache_duration = 'none'
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    template = ' ’ā¦ '
    foreground = 'p:white'
    powerline_symbol = 'Ņé░'
    background = 'p:yellow'
    type = 'root'
    style = 'powerline'

    [blocks.segments.properties]
      cache_duration = 'none'

  [[blocks.segments]]
    leading_diamond = '<transparent,background>Ņé░</>'
    trailing_diamond = 'Ņé┤'
    template = ' {{ if gt .Code 0 }}’ĆŹ{{ else }}’Ćī{{ end }} '
    foreground = 'p:white'
    background = 'p:blue'
    type = 'status'
    style = 'diamond'
    background_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']

    [blocks.segments.properties]
      always_enabled = true
      cache_duration = 'none'

[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    template = 'Ņ£ś '
    foreground = 'p:green'
    background = 'transparent'
    type = 'node'
    style = 'plain'

    [blocks.segments.properties]
      cache_duration = 'none'
      display_mode = 'files'
      fetch_package_manager = false
      home_enabled = false

  [[blocks.segments]]
    template = 'Ņś” '
    foreground = 'p:blue'
    background = 'transparent'
    type = 'go'
    style = 'plain'

    [blocks.segments.properties]
      cache_duration = 'none'
      fetch_version = false

  [[blocks.segments]]
    template = 'ŅłĄ '
    foreground = 'p:yellow'
    background = 'transparent'
    type = 'python'
    style = 'plain'

    [blocks.segments.properties]
      cache_duration = 'none'
      display_mode = 'files'
      fetch_version = false
      fetch_virtual_env = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'ŌØ»'
    foreground = '#52ad70'
    type = 'text'
    style = 'plain'

    [blocks.segments.properties]
      cache_duration = 'none'

[[tooltips]]
  leading_diamond = 'Ņé░'
  trailing_diamond = 'Ņé┤'
  template = ' Ņ×Ł {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:white'
  background = 'p:orange'
  type = 'aws'
  style = 'diamond'
  tips = ['aws']

  [tooltips.properties]
    display_default = true

[[tooltips]]
  leading_diamond = 'Ņé░'
  trailing_diamond = 'Ņé┤'
  template = ' Ņ»ś {{ .Name }} '
  foreground = 'p:white'
  background = 'p:blue'
  type = 'az'
  style = 'diamond'
  tips = ['az']

  [tooltips.properties]
    display_default = true
